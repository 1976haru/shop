<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>상품 등록 전 진단기</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <p>LOCAL · 외부 전송 없음</p>
    <h1>상품 등록 전 진단기</h1>
    <p>공급사 CSV의 누락 정보, 옵션, 마진, 고시정보를 검사합니다.</p>
  </header>
  <main>
    <section class="panel">
      <h2>CSV 진단</h2>
      <input id="file" type="file" accept=".csv,text/csv">
      <button id="diagnose">내 파일 진단하기</button>
      <button id="demo">오류 샘플로 체험하기</button>
      <p id="status"></p>
    </section>
    <section id="result" class="panel hidden">
      <div id="summary"></div>
      <div id="downloads"></div>
      <div id="causes"></div>
      <table>
        <thead><tr><th>행</th><th>SKU</th><th>판정</th><th>준비도</th><th>문제</th><th>수정</th></tr></thead>
        <tbody id="items"></tbody>
      </table>
    </section>
    <section class="panel">
      <h2>최근 진단</h2>
      <div id="history"></div>
    </section>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>

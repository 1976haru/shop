name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npm run check
      - run: npm run diagnose -- fixtures/slice0/normal-agri.csv --out tmp/ci-report.json

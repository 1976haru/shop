services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      DATA_ROOT: /data
      RETENTION_DAYS: 30
      RETENTION_TZ: Asia/Seoul
      ALLOW_EXTERNAL_RESEARCH: "${ALLOW_EXTERNAL_RESEARCH:-false}"
      KAMIS_CERT_KEY: "${KAMIS_CERT_KEY:-}"
      KAMIS_CERT_ID: "${KAMIS_CERT_ID:-}"
      NAVER_TREND_ENDPOINT: "${NAVER_TREND_ENDPOINT:-}"
      NAVER_TREND_CLIENT_ID: "${NAVER_TREND_CLIENT_ID:-}"
      NAVER_TREND_CLIENT_SECRET: "${NAVER_TREND_CLIENT_SECRET:-}"
      NAVER_TREND_ID_HEADER: "${NAVER_TREND_ID_HEADER:-X-Naver-Client-Id}"
      NAVER_TREND_SECRET_HEADER: "${NAVER_TREND_SECRET_HEADER:-X-Naver-Client-Secret}"
      FOOD_SAFETY_KEY: "${FOOD_SAFETY_KEY:-}"
      FOOD_SAFETY_SERVICE_ID: "${FOOD_SAFETY_SERVICE_ID:-}"
      FOOD_SAFETY_QUERY_FIELD: "${FOOD_SAFETY_QUERY_FIELD:-}"
    volumes:
      - commerce-data:/data
volumes:
  commerce-data:

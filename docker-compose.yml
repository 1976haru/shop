services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      DATA_ROOT: /data
      RETENTION_DAYS: 30
      RETENTION_TZ: Asia/Seoul
      DISABLE_EXTERNAL_NETWORK: "true"
    volumes:
      - commerce-data:/data
volumes:
  commerce-data:
